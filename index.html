<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">

  <!-- Icons / PWA -->
  <link rel="icon" href="assets/icons/favicon.ico">
  <link rel="icon" type="image/png" sizes="16x16" href="assets/icons/favicon-16.png">
  <link rel="icon" type="image/png" sizes="32x32" href="assets/icons/favicon-32.png">
  <link rel="apple-touch-icon" sizes="180x180" href="assets/icons/apple-touch-icon.png">
  <link rel="manifest" href="site.webmanifest">
  <meta name="theme-color" content="#0f172a">
  <title>提詞機・速成倉頡字典</title>
  <style>
    /* 基本重置 */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root{
      --softkbd-height: 0px;
      /* 全局字體放大 */
      --ui-scale: 1.15;
    }
    body {
      background: #0f172a;
      color: #f8fafc;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      align-items: stretch;
      justify-content: stretch;
      min-height: 100vh;
      padding: 0;
      margin: 0;
    }
    .app {
      width: 100vw;
      max-width: 100vw;
      height: 100vh;
      max-height: 100vh;
      background: #1e293b;
      border-radius: 0;
      border: 0;
      box-shadow: none;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      position: relative;
      padding-top: calc(env(safe-area-inset-top, 0px) + 8px);
      padding-left: env(safe-area-inset-left, 0px);
      padding-right: env(safe-area-inset-right, 0px);
    }
    body.softkbd-open .content { padding-bottom: calc(20px + var(--softkbd-height)); }
    body.softkbd-open .typing-footer { padding-bottom: calc(10px + var(--softkbd-height)); }
    
    .status-banner {
      background: #1e3a8a; padding: 12px 16px; text-align: center; font-weight: 800; font-size: calc(1.05rem * var(--ui-scale));
      color: #93c5fd; border-bottom: 1px solid #3b82f6; display: flex; align-items: center; justify-content: center; gap: 12px; flex-shrink: 0; flex-wrap: wrap;
    }
    .status-banner.error { background: #7f1d1d; color: #fca5a5; border-bottom-color: #ef4444; }
    .status-banner.success { background: #065f46; color: #6ee7b7; border-bottom-color: #10b981; }
    .status-banner button, .status-banner label {
      background: #2563eb; border: none; padding: 4px 16px; border-radius: 30px; color: white; font-weight: 700; cursor: pointer; font-size: 0.85rem;
    }
    .status-banner button:hover, .status-banner label:hover { background: #3b82f6; }
    .status-banner input[type="file"] { display: none; }
    
    .tabs { display: flex; background: #0f172a; border-bottom: 2px solid #334155; flex-shrink: 0; }
    .tabs button {
      flex: 1; padding: 18px 0; font-size: calc(1.25rem * var(--ui-scale)); font-weight: 800; background: transparent; border: none;
      color: #64748b; cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 10px; border-bottom: 4px solid transparent;
    }
    .tabs button.active { color: #60a5fa; border-bottom-color: #3b82f6; background: #1e293b; }
    .tabs button:hover { color: #e2e8f0; }
    .content { padding: 18px 18px 20px; overflow-y: auto; flex: 1; }

    .app.mode-dict .status-banner { padding: 8px 12px; font-size: calc(0.95rem * var(--ui-scale)); }
    .app.mode-dict .tabs button { padding: 12px 0; font-size: calc(1.1rem * var(--ui-scale)); }
    .app.mode-dict .content { padding: 12px 16px 16px; }
    .app.mode-dict .dict-area { gap: 12px; }
    
    .prompter-area textarea {
      width: 100%; height: min(40vh, 340px); background: #0f172a; border: 2px solid #475569; border-radius: 18px; padding: 18px;
      color: white; font-size: calc(clamp(1.25rem, 2.2vw, 1.8rem) * var(--ui-scale)); line-height: 1.4; resize: vertical; outline: none; transition: border 0.2s;
    }
    .prompter-area textarea:focus { border-color: #3b82f6; }
    .prompter-area textarea::placeholder { color: transparent; }
    
    /* 自訂閃爍游標 Placeholder */
    .custom-placeholder {
      position: absolute; top: 18px; left: 18px;
      color: #64748b; font-size: calc(clamp(1.25rem, 2.2vw, 1.8rem) * var(--ui-scale));
      pointer-events: none; display: flex; align-items: center; user-select: none;
    }
    /* 游標前置 */
    .custom-placeholder .cursor {
      display: inline-block; width: 2.5px; height: 1.1em; background-color: #64748b;
      margin-right: 6px; animation: textBlink 1.2s step-end infinite; border-radius: 2px;
    }
    /* 點擊文字框立即隱藏 Placeholder */
    #inputTextArea:focus + #fauxPlaceholder { display: none !important; }
    
    @keyframes textBlink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

    .btn-primary {
      width: 100%; padding: 20px; margin-top: 18px; background: #2563eb; border: none; border-radius: 18px; color: white;
      font-weight: 900; font-size: calc(1.35rem * var(--ui-scale)); display: flex; align-items: center; justify-content: center; gap: 12px; box-shadow: 0 6px 0 #1e3a8a; transition: all 0.08s linear; cursor: pointer;
    }
    .btn-primary:active { transform: translateY(4px); box-shadow: 0 2px 0 #1e3a8a; }
    .btn-primary:disabled { opacity: 0.4; transform: none; box-shadow: 0 6px 0 #1e3a8a; cursor: not-allowed; }
    
    .drafts { margin-top: 24px; border-top: 1px solid #334155; padding-top: 20px; }
    .drafts h3 { font-size: 0.9rem; color: #94a3b8; display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-bottom: 12px; }
    .draft-clear-btn{ background: rgba(255,255,255,0.08); border: 1px solid #334155; color: #e2e8f0; padding: 6px 12px; border-radius: 999px; font-weight: 900; cursor: pointer; font-size: 0.85rem; }
    .draft-clear-btn:hover{ border-color:#60a5fa; }
    .draft-item { background: #0f172a; padding: 12px 12px 12px 16px; border-radius: 12px; border: 1px solid #334155; margin-bottom: 8px; cursor: pointer; transition: 0.2s; font-size: 0.95rem; color: #cbd5e1; display: flex; align-items: center; gap: 10px; }
    .draft-item:hover { border-color: #3b82f6; }
    .draft-text { flex: 1 1 auto; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .draft-del-btn{ flex: 0 0 auto; width: 36px; height: 36px; border-radius: 999px; background: rgba(255,255,255,0.06); border: 1px solid #334155; color: #e2e8f0; cursor: pointer; font-weight: 900; line-height: 1; display: inline-flex; align-items: center; justify-content: center; }
    .draft-del-btn:hover{ border-color:#f87171; color:#fecaca; }
    
    .dict-area { display: flex; flex-direction: column; align-items: center; gap: 18px; }
    .dict-input {
      width: clamp(150px, 30vw, 240px); height: clamp(150px, 30vw, 240px); background: #0b1220; border: 4px solid #334155; border-radius: 28px; text-align: center;
      font-size: calc(clamp(4.5rem, 10vw, 7rem) * var(--ui-scale)); font-weight: 900; color: #f8fafc; outline: none; transition: 0.2s; caret-color: #cbd5e1;
    }
    .dict-input:focus { border-color: #94a3b8; box-shadow: 0 0 0 4px rgba(148,163,184,0.25); }
    .dict-input-wrap{ position: relative; display: grid; place-items: center; }
    .dict-input-wrap .dict-input{ grid-area: 1 / 1; }
    .dict-input-wrap .dict-pen{
      grid-area: 1 / 1; pointer-events: none; user-select: none; font-size: calc(clamp(3.0rem, 9vw, 5.2rem) * var(--ui-scale));
      line-height: 1; color: #94a3b8; opacity: 0.95; filter: drop-shadow(0 4px 0 rgba(0,0,0,0.28)); transition: opacity 120ms ease, transform 120ms ease; display: grid; place-items: center;
    }
    .dict-input-wrap .dict-pen svg{ width: 1em; height: 1em; display:block; }
    .dict-input-wrap:focus-within .dict-pen{ opacity: 0; transform: scale(0.92); }
    .dict-input-wrap.has-value .dict-pen{ opacity: 0; transform: scale(0.92); }

    .dict-top { width: 100%; display:flex; align-items:center; justify-content:flex-start; margin-bottom: 8px; }
    .dict-top button { background: rgba(255,255,255,0.06); border: 1px solid #334155; color: #e2e8f0; width: 44px; height: 44px; border-radius: 14px; font-size: 1.6rem; font-weight: 900; cursor: pointer; }
    .dict-top button:active { transform: translateY(1px); }

    .result-box {
      width: 100%; background: #0b1220; border: 2px solid #334155; border-radius: 24px; padding: 24px 12px; min-height: 150px; display: flex; flex-direction: column; align-items: center; justify-content: center; margin-top: 8px;
    }
    .result-placeholder { color: #475569; font-weight: 800; font-size: calc(1.15rem * var(--ui-scale)); }
    .code-blocks { display: flex; flex-wrap: wrap; align-items: center; justify-content: center; gap: 8px; width: 100%; }

    .code-blocks.quick-4col .code-block{ flex: 0 0 calc(25% - 8px); width: calc(25% - 8px); min-width: 0; padding: 14px 0; font-size: calc(clamp(1.8rem, 9vw, 2.8rem) * var(--ui-scale)); }
    .code-blocks.quick-4col{ max-width: 420px; margin-left: auto; margin-right: auto; }
    .code-blocks.quick-4col .code-block.arrow{ padding: 0; font-size: calc(1.6rem * var(--ui-scale)); }
    
    /* 解碼方塊預設為長方形大字體，加入過渡效果 */
    .code-block {
      background: #334155; border-radius: 14px; padding: 14px 16px; min-width: 72px; min-height: 86px; display: flex; align-items: center; justify-content: center;
      font-weight: 900; font-size: calc(clamp(1.8rem, 9vw, 2.8rem) * var(--ui-scale)); color: #f8fafc; border: 3px solid #94a3b8; box-shadow: 0 5px 0 rgba(0,0,0,0.35); text-transform: uppercase; position: relative; overflow: hidden;
      transition: all 0.2s ease;
    }

    /* 文本深色陰影 - 讓白字在色彩中絕對清晰 (長者防老花設計) */
    .code-block .code-main, .code-block .code-sub { text-shadow: 0 2px 5px rgba(0,0,0,0.85), 0 0 10px rgba(0,0,0,0.6); }
    .code-block .code-main{ position: relative; z-index: 2; transition: all 0.2s ease; }
    .code-block .code-sub{ position: absolute; right: 8px; bottom: 6px; z-index: 1; font-weight: 900; font-size: calc(0.82rem * var(--ui-scale)); line-height: 1; color: rgba(248,250,252,0.95); pointer-events: none; text-transform: uppercase; background: transparent; padding: 0; border: none; border-radius: 0; transition: all 0.2s ease; }
    .code-block.has-sub{ padding-right: 52px; padding-bottom: 44px; }
    
    .code-block.cj { background:#1d4ed8; color:#ffffff; border-color:#93c5fd; box-shadow: 0 6px 0 rgba(0,0,0,0.35), inset 0 0 0 2px rgba(255,255,255,0.18); }
    .code-block.quick-head { background:#059669; border-color:#34d399; }
    .code-block.quick-head.radical { background:#059669; border-color:#34d399; }

    .code-blocks.cj-grid{ display: grid; grid-template-columns: repeat(24, minmax(0, 1fr)); gap: 8px; width: 100%; justify-content: stretch; align-items: center; overflow: hidden; padding-bottom: 2px; }
    .code-blocks.cj-grid .code-block{ grid-column: span 6; min-width: 0; width: 100%; padding: 14px 0; font-size: calc(clamp(1.8rem, 9vw, 2.8rem) * var(--ui-scale)); }

    .code-blocks.cj-grid.cj-len-1 .code-block:nth-child(1){ grid-column: 10 / span 6; }
    .code-blocks.cj-grid.cj-len-2 .code-block:nth-child(1){ grid-column: 7 / span 6; }
    .code-blocks.cj-grid.cj-len-2 .code-block:nth-child(2){ grid-column: 13 / span 6; }
    .code-blocks.cj-grid.cj-len-3 .code-block:nth-child(1){ grid-column: 4 / span 6; }
    .code-blocks.cj-grid.cj-len-3 .code-block:nth-child(2){ grid-column: 10 / span 6; }
    .code-blocks.cj-grid.cj-len-3 .code-block:nth-child(3){ grid-column: 16 / span 6; }
    .code-blocks.cj-grid.cj-len-4 .code-block:nth-child(1){ grid-column: 1 / span 6; }
    .code-blocks.cj-grid.cj-len-4 .code-block:nth-child(2){ grid-column: 7 / span 6; }
    .code-blocks.cj-grid.cj-len-4 .code-block:nth-child(3){ grid-column: 13 / span 6; }
    .code-blocks.cj-grid.cj-len-4 .code-block:nth-child(4){ grid-column: 19 / span 6; }
    .code-blocks.cj-grid.cj-len-5 .code-block:nth-child(1){ grid-row:1; grid-column: 7 / span 6; }
    .code-blocks.cj-grid.cj-len-5 .code-block:nth-child(2){ grid-row:1; grid-column: 13 / span 6; }
    .code-blocks.cj-grid.cj-len-5 .code-block:nth-child(3){ grid-row:2; grid-column: 4 / span 6; }
    .code-blocks.cj-grid.cj-len-5 .code-block:nth-child(4){ grid-row:2; grid-column: 10 / span 6; }
    .code-blocks.cj-grid.cj-len-5 .code-block:nth-child(5){ grid-row:2; grid-column: 16 / span 6; }

    .code-block.radical { background: #059669; border-color: #34d399; }
    .code-block.arrow { background: transparent; border: none; box-shadow: none; font-size: calc(1.8rem * var(--ui-scale)); color: #64748b; min-width: auto; padding: 0 6px; }
    .code-block.number { background: #d97706; border-color: #fbbf24; box-shadow: 0 4px 0 #92400e; }
    .not-found { text-align: center; color: #f87171; }
    .not-found button { margin-top: 12px; padding: 8px 20px; background: #334155; border: 1px solid #475569; border-radius: 10px; color: white; font-weight: 700; cursor: pointer; transition: 0.2s; }
    .not-found button:hover { background: #475569; }

    /* ================== 全新打字覆蓋層：物理防重疊 Flexbox ================== */
    .typing-overlay {
      position: fixed;
      inset: 0;
      height: 100dvh; /* 現代防遮擋高度 */
      background: #0f172a;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      justify-content: flex-start;
      padding-bottom: var(--softkbd-height); /* 防原生手機軟鍵盤 */
      z-index: 1000;
    }
    @supports not (height: 100dvh) {
      .typing-overlay { height: 100%; }
    }

    .typing-card {
      width: 100%;
      flex: 1 1 0; /* 自動霸佔剩餘空間，受壓時自然縮小 */
      min-height: 0; /* 讓內部捲動生效 */
      background: #1e293b;
      border-radius: 0;
      border: 0;
      padding-top: calc(env(safe-area-inset-top, 0px) + 14px);
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
    }

    /* 左上角離開（✕） */
    .typing-exit{
      position: absolute;
      top: calc(env(safe-area-inset-top, 0px) + 10px);
      left: calc(env(safe-area-inset-left, 0px) + 10px);
      width: 46px; height: 46px; border-radius: 999px; background: rgba(255,255,255,0.10); border: 1px solid rgba(148,163,184,0.35);
      color: #f8fafc; font-size: 1.6rem; font-weight: 900; cursor: pointer; z-index: 5; transition: transform 0.2s ease;
    }
    .typing-exit:hover{ background: rgba(255,255,255,0.18); border-color: rgba(147,197,253,0.55); }

    .typing-display-area{
      width:100%;
      flex: 0 0 auto;
      height: 34vh;
      max-height: 340px;
      position: relative;
      transition: height 180ms ease, max-height 180ms ease;
    }
    .typing-char {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      font-size: calc(clamp(3.9rem, 10.2vw, 7.2rem) * var(--ui-scale)); font-weight: 900; line-height: 0.98; color: #f8fafc; text-shadow: 0 8px 30px rgba(0,0,0,0.5);
      display: flex; align-items: center; justify-content: center; padding: 2px 0 0; user-select: none; cursor: pointer; transition: font-size 180ms ease;
    }

    .typing-context{
      position: absolute; left: 50%; top: 50%; transform: translate(-50%, 0); margin-top: 1.05em; width: 100%; max-width: 92vw; padding: 6px 6px;
      color: #94a3b8; font-size: calc(clamp(2.0rem, 5.2vw, 3.2rem) * var(--ui-scale)); line-height: 1.15; white-space: nowrap; overflow: hidden; text-align: center; user-select: none; transition: font-size 180ms ease, margin-top 180ms ease;
    }
    .typing-context .tctx-ch{ display:inline-block; opacity: 0.55; padding: 0 0.10em; }
    /* 藍色加粗實線，防止被誤認為中文字「一」 */
    .typing-context .tctx-ch.active{ opacity: 0.98; color:#cbd5e1; text-decoration: underline; text-decoration-color: #3b82f6; text-decoration-thickness: 3px; text-underline-offset: 6px; }

    /* ---------- 解碼區排版 (自動填充) ---------- */
    .typing-footer {
      background: #0f172a;
      border-top: 2px solid #334155;
      padding: 14px 12px;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      flex: 1 1 auto; /* 自動食剩餘空間 */
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }
    .typing-footer .code-blocks{ margin-top: 8px; gap: 8px; }

    .toggle-bar { display: flex; gap: 10px; flex-wrap: nowrap; justify-content: space-between; align-items: stretch; margin-bottom: 8px; width: 100%; }
    .toggle-bar button {
      background: #1e293b; border: 1px solid #334155; border-radius: 18px; padding: 12px 14px; font-size: calc(1.10rem * var(--ui-scale)); font-weight: 900;
      color: #e2e8f0; cursor: pointer; transition: 0.2s; min-width: 0; flex: 1 1 0; position: relative; display: flex; align-items: center; justify-content: flex-start; gap: 10px;
    }
    .typing-footer .toggle-bar button .btn-title{ font-size: calc(1.12rem * var(--ui-scale)); font-weight: 950; letter-spacing: 0.02em; }
    .toggle-bar button .btn-status{ margin-left: auto; display: flex; align-items: center; justify-content: center; pointer-events: none; }
    .toggle-bar button .status-badge{ width: 26px; height: 26px; border-radius: 999px; display: inline-flex; align-items: center; justify-content: center; font-size: calc(0.92rem * var(--ui-scale)); font-weight: 950; letter-spacing: 0.02em; color: #ffffff; border: 2px solid rgba(255,255,255,0.18); box-shadow: inset 0 -2px 0 rgba(0,0,0,0.25); }
    .toggle-bar button .status-badge.zh{ background: #16a34a; }
    .toggle-bar button .status-badge.en{ background: #2563eb; }
    .toggle-bar button .status-badge.inactive{ opacity: 0.55; filter: saturate(0.7); }
    .toggle-bar button.active { background: #334155; color: #f8fafc; border-color: #94a3b8; }
    .typing-footer .toggle-bar button.active.radical-active { background: #475569; border-color: #cbd5e1; color: #f8fafc; }

    /* ---------- 底部導航掣極致瘦身：騰出空間給倉頡碼 ---------- */
    .typing-nav-bottom {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 16px calc(6px + env(safe-area-inset-bottom, 0px));
      background: transparent; 
      flex: 0 0 auto; 
      border-top: none; 
      z-index: 10;
      transition: padding 180ms ease;
    }
    .typing-nav-bottom button.nav-btn {
      background: transparent !important;
      border: none !important;
      border-radius: 0;
      width: 54px; 
      height: 44px; 
      color: rgba(248, 250, 252, 0.95);
      font-size: 2.2rem; 
      font-weight: 900;
      cursor: pointer;
      transition: 0.15s ease;
      display: flex; align-items: center; justify-content: center;
      box-shadow: none !important;
    }
    .typing-nav-bottom button.nav-btn:active{ transform: scale(0.85); color: #3b82f6; }
    .typing-nav-bottom button.nav-btn:disabled { opacity: 0.15; cursor: default; transform: none; }

    /* 中間嘅鍵盤開關掣瘦身 */
    .hintkbd-toggle {
      width: 48px;
      height: 48px; 
      border-radius: 0;
      border: none !important;
      background: transparent !important;
      color: #e2e8f0;
      font-weight: 950;
      font-size: 2.4rem; 
      cursor: pointer;
      display: inline-flex; align-items: center; justify-content: center;
      box-shadow: none !important;
      transition: all 0.2s ease;
    }
    .hintkbd-toggle:active { transform: scale(0.85); color: #3b82f6; }

    /* ---------- 強力擠壓邏輯：完美分割畫面 ---------- */
    body.hintkbd-open .typing-display-area { 
      height: 18vh; 
      max-height: 150px; 
    }
    body.hintkbd-open .typing-char { font-size: calc(clamp(3.0rem, 8vw, 4.6rem) * var(--ui-scale)); }
    body.hintkbd-open .typing-context { font-size: calc(clamp(1.5rem, 3.8vw, 2.2rem) * var(--ui-scale)); margin-top: 0.7em; }
    
    body.hintkbd-open .toggle-bar { margin-bottom: 2px; gap: 6px; }
    body.hintkbd-open .toggle-bar button { padding: 6px 10px; border-radius: 12px; }
    body.hintkbd-open .toggle-bar button .btn-title { font-size: calc(0.95rem * var(--ui-scale)); }
    body.hintkbd-open .toggle-bar button .status-badge { width: 20px; height: 20px; font-size: calc(0.75rem * var(--ui-scale)); }
    
    /* 鍵盤打開時：倉頡解碼方塊強制變回完美正方形，解決太扁問題 */
    body.hintkbd-open .code-block { 
      aspect-ratio: 1 / 1; /* 長寬比例 1:1，完美正方形 */
      min-height: auto; 
      padding: 6px; 
      border-width: 2px; 
      box-shadow: 0 4px 0 rgba(0,0,0,0.35); 
      font-size: calc(clamp(1.6rem, 7vw, 2.4rem) * var(--ui-scale)); 
    }
    body.hintkbd-open .code-block.has-sub { padding-right: 36px; padding-bottom: 28px; }
    body.hintkbd-open .code-block .code-sub { font-size: calc(0.85rem * var(--ui-scale)); right: 6px; bottom: 4px; }

<body>
<div id="root"></div>
<script>
  (function(){
    "use strict";

    // ---------- 鍵盤避讓（浮動鍵盤遮住時自動上移） ----------
    function setupKeyboardAvoidance(){
      const rootEl = document.documentElement;
      const body = document.body;
      let baselineInnerH = window.innerHeight || 0;

      function update(){
        const vv = window.visualViewport;
        if ((window.innerHeight || 0) > baselineInnerH) baselineInnerH = window.innerHeight || 0;

        let khVV = 0;
        if (vv) {
          khVV = Math.max(0, (window.innerHeight || 0) - vv.height - (vv.offsetTop || 0));
        }
        const khIH = Math.max(0, baselineInnerH - (window.innerHeight || 0));
        const kh = Math.max(khVV, khIH);

        rootEl.style.setProperty('--softkbd-height', kh + 'px');

        if (kh > 80) body.classList.add('softkbd-open');
        else body.classList.remove('softkbd-open');
      }

      if (window.visualViewport) {
        window.visualViewport.addEventListener('resize', update);
        window.visualViewport.addEventListener('scroll', update);
      }
      window.addEventListener('resize', update);
      update();

      function ensureVisible(el){
        if (!el) return;
        setTimeout(() => {
          try {
            const vv = window.visualViewport;
            const viewH = vv ? vv.height : window.innerHeight;
            const rect = el.getBoundingClientRect();
            const margin = 18;
            const needScroll = (rect.bottom > (viewH - margin)) || (rect.top < margin);
            if (needScroll) {
              el.scrollIntoView({block:'center', inline:'nearest', behavior:'auto'});
            }
          } catch (e) {
            try { el.scrollIntoView(true); } catch(e2) {}
          }
        }, 60);
      }

      body.addEventListener('focusin', (e) => {
        const t = e.target;
        if (!t) return;
        const tag = (t.tagName || '').toLowerCase();
        if (tag === 'input' || tag === 'textarea' || t.isContentEditable) {
          update();
          if (t.id === 'inputTextArea') return;
          ensureVisible(t);
        }
      }, true);

      body.addEventListener('focusout', () => {
        setTimeout(update, 120);
      }, true);
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', setupKeyboardAvoidance);
    } else {
      setupKeyboardAvoidance();
    }

    /* ⚠️ 如果你想 100% 完全單機（永遠唔連接上網），可以將你舊檔案嗰幾萬字字典貼返落呢個 EMBEDDED_DICT ⚠️ */
    const EMBEDDED_DICT = {"日":"a","曰":"a","昌":"aa","昍":"aa","晶":"aaa","明":"ab","早":"aj","時":"agdi","是":"amyo","門":"an","間":"ana","晚":"anau","閒":"anb","月":"b","有":"kb","朋":"bb","骨":"bbb","受":"bbe","愛":"bbpe","青":"qmb","清":"eqmb","情":"pqmb","請":"yrqmb","睛":"buqmb","金":"c","銀":"cav","銅":"cbmr","鐵":"cjig","木":"d","林":"dd","森":"ddd","樹":"dgti","水":"e","冰":"ime","海":"eowy","火":"f","炎":"ff","土":"g","地":"gpd","竹":"h","笑":"hhk","戈":"i","我":"hqi","十":"j","真":"jbmc","大":"k","天":"mk","中":"l","一":"m","弓":"n","人":"o","心":"p","手":"q","口":"r","尸":"s","廿":"t","山":"u","女":"v","田":"w","卜":"y"};

    const CJ_CACHE_KEY = 'cangjie_dict_v4_rime75k';
    const RAW_SOURCES = [
      'https://cdn.jsdelivr.net/gh/stephenmk/chinese-cangjie@master/cangjie5.json',
      'https://unpkg.com/chinese-cangjie@1.0.0/cangjie5.json',
      'https://raw.githubusercontent.com/stephenmk/chinese-cangjie/master/cangjie5.json'
    ];

    function buildSources() {
      const list = [...RAW_SOURCES];
      if (location.protocol === 'file:') {
        const proxies = [
          (u) => `https://corsproxy.io/?${encodeURIComponent(u)}`,
          (u) => `https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`
        ];
        for (const u of RAW_SOURCES) {
          for (const p of proxies) list.push(p(u));
        }
      }
      return list;
    }
    const SOURCES = buildSources();

    function normalizeDictCodes(dict){
      if (!dict || typeof dict !== 'object') return dict;
      const out = {};
      for (const ch in dict) {
        const v = dict[ch];
        if (typeof v === 'string') out[ch] = v.toUpperCase();
      }
      return out;
    }

    let EMBEDDED_DICT_UPPER = null;
    function getEmbeddedDictUpper(){
      if (EMBEDDED_DICT_UPPER) return EMBEDDED_DICT_UPPER;
      EMBEDDED_DICT_UPPER = normalizeDictCodes(EMBEDDED_DICT);
      return EMBEDDED_DICT_UPPER;
    }

    let cjDict = null;
    let dictStatus = 'idle';
    let QUICK_NUM_MAP = null;
    let QUICK_BUCKETS = null;

    function buildQuickData(dict) {
      const buckets = {};
      for (const ch in dict) {
        const code = dict[ch];
        if (!code || typeof code !== 'string') continue;
        const letters = code.split('');
        if (letters.length === 0) continue;
        const first = letters[0];
        const last = letters.length === 1 ? letters[0] : letters[letters.length - 1];
        const quick = (first + last).toLowerCase();
        (buckets[quick] ||= []).push(ch);
      }
      const map = {};
      for (const quick in buckets) {
        const arr = buckets[quick];
        for (let i = 0; i < arr.length; i++) {
          map[arr[i]] = i + 1;
        }
      }
      return { map, buckets };
    }

    function loadDictFromCache() {
      try {
        const raw = localStorage.getItem(CJ_CACHE_KEY);
        if (raw) {
          cjDict = normalizeDictCodes(JSON.parse(raw));
          dictStatus = 'ready';
          ({ map: QUICK_NUM_MAP, buckets: QUICK_BUCKETS } = buildQuickData(cjDict));
          return true;
        }
      } catch(e) {}
      return false;
    }

    async function fetchDictWithRetry() {
      dictStatus = 'loading';
      render();

      for (let i = 0; i < SOURCES.length; i++) {
        try {
          const url = SOURCES[i];
          const resp = await fetch(url, { cache: 'no-cache', mode: 'cors' });
          if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
          const data = await resp.json();
          let dict = {};
          if (Array.isArray(data)) {
            data.forEach(item => { if (item.length>=2) dict[item[0]] = item[1]; });
          } else if (typeof data === 'object') {
            dict = data;
          } else {
            throw new Error('格式錯誤');
          }
          dict = normalizeDictCodes(dict);
          localStorage.setItem(CJ_CACHE_KEY, JSON.stringify(dict));
          cjDict = dict;
          dictStatus = 'ready';
          ({ map: QUICK_NUM_MAP, buckets: QUICK_BUCKETS } = buildQuickData(cjDict));
          render();
          return true;
        } catch (e) {
          console.warn(`下載源 ${i+1} 失敗:`, e);
        }
      }
      const embedded = getEmbeddedDictUpper();
      try { localStorage.setItem(CJ_CACHE_KEY, JSON.stringify(embedded)); } catch(e) {}
      cjDict = embedded;
      dictStatus = 'embedded';
      ({ map: QUICK_NUM_MAP, buckets: QUICK_BUCKETS } = buildQuickData(cjDict));
      render();
      return true;
    }
    
    /* 提供給「📂匯入字庫」按鈕的手動讀取功能 */
    function loadDictFromFile(file) {
      const reader = new FileReader();
      reader.onload = function(e) {
        try {
          const data = JSON.parse(e.target.result);
          let dict = {};
          if (Array.isArray(data)) {
            data.forEach(item => { if (item.length>=2) dict[item[0]] = item[1]; });
          } else if (typeof data === 'object') {
            dict = data;
          } else {
            throw new Error('格式錯誤');
          }
          dict = normalizeDictCodes(dict);
          localStorage.setItem(CJ_CACHE_KEY, JSON.stringify(dict));
          cjDict = dict;
          dictStatus = 'ready';
          ({ map: QUICK_NUM_MAP, buckets: QUICK_BUCKETS } = buildQuickData(cjDict));
          render();
          alert('✅ 字庫匯入成功！以後可以永久離線使用啦！');
        } catch (err) {
          alert('❌ 無效嘅碼表檔案，請確保係 JSON 格式。');
        }
      };
      reader.readAsText(file);
    }

    async function ensureDict() {
      if ((dictStatus === 'ready' || dictStatus === 'embedded') && cjDict) return true;
      if (loadDictFromCache()) return true;
      return await fetchDictWithRetry();
    }

    function getCharCodes(char) {
      if (!char || char.length !== 1) return null;
      if (!cjDict) return null;

      const PUNCT_OVERRIDE = {
        '，':'ZXAB','、':'ZXAC','。':'ZXAD','；':'ZXAG','：':'ZXAH','？':'ZXAI','！':'ZXAJ','…':'ZXAL',
        '（':'ZXBE','）':'ZXBF','《':'ZXBU','》':'ZXBV','「':'ZXCD','」':'ZXCE','『':'ZXCH','』':'ZXCI',
        '﹖':'ZXAI','﹗':'ZXAJ','︰':'ZXAH','．':'ZXAD','‧':'ZXAF'
      };
      const CJ_OVERRIDE = { '麻':'IJCC' };

      const raw = (PUNCT_OVERRIDE[char] || CJ_OVERRIDE[char] || cjDict[char]);
      if (!raw) return null;
      const letters = String(raw).toUpperCase().split('');

      const isPunct = (letters.length >= 4 && letters[0] === 'Z' && letters[1] === 'X');

      const quick = (letters.length === 1)
        ? [letters[0], letters[0]]
        : [letters[0], letters[letters.length-1]];
      const quickCode = (quick[0] + quick[1]).toLowerCase();
      const qIndex = (QUICK_NUM_MAP && QUICK_NUM_MAP[char]) ? QUICK_NUM_MAP[char] : 1;
      const qPage = Math.floor((qIndex - 1) / 9) + 1;
      const qKey  = ((qIndex - 1) % 9) + 1;
      return { cj: letters, q: quick, quickCode, qIndex, qPage, qKey, isPunct };
    }

    try {
      const PUNCT_DICT = {
        '，':'ZXAB','、':'ZXAC','。':'ZXAD','；':'ZXAG','：':'ZXAH','？':'ZXAI','！':'ZXAJ','…':'ZXAL',
        '（':'ZXBE','）':'ZXBF','《':'ZXBU','》':'ZXBV','「':'ZXCD','」':'ZXCE','『':'ZXCH','』':'ZXCI',
        '﹖':'ZXAI','﹗':'ZXAJ','︰':'ZXAH','．':'ZXAD','‧':'ZXAF'
      };
      for (const k in PUNCT_DICT) {
        if (!EMBEDDED_DICT[k]) EMBEDDED_DICT[k] = PUNCT_DICT[k];
      }
    } catch(e) {}

    const RADICAL_MAP = {
      "A":"日","B":"月","C":"金","D":"木","E":"水","F":"火","G":"土",
      "H":"竹","I":"戈","J":"十","K":"大","L":"中","M":"一","N":"弓",
      "O":"人","P":"心","Q":"手","R":"口","S":"尸","T":"廿","U":"山",
      "V":"女","W":"田","X":"難","Y":"卜","Z":"重"
    };

    // ---------- 狀態 ----------
    let state = {
      activeTab: 'prompter',
      inputText: '',
      isTyping: false,
      currentIndex: 0,
      showSaveDialog: false,
      savedDrafts: [],
      dictInput: '',
      inputMethod: 'cangjie',
      showRadical: false,
      textArray: [],
      textArrayRaw: [],
      textIndexMap: [],
      contextWindowSize: 0,
      ttsMuted: true,
      ttsRate: 1.0,
      ttsRepeat: 1,
      ttsSettingsOpen: false,
      ttsVoiceURI: '',
      ttsLastSpokenKey: '',
      _typingHistoryPushed: false,
      hintKbdOn: false
    };

    try {
      const drafts = JSON.parse(localStorage.getItem('savedDrafts')) || [];
      state.savedDrafts = drafts;
    } catch(e) {}

    (function initTtsMuted() {
      try {
        const v = localStorage.getItem('ttsMuted_v1');
        if (v === null) {
          state.ttsMuted = true;
          localStorage.setItem('ttsMuted_v1', '1');
        } else {
          state.ttsMuted = (v === '1');
        }
      } catch(e) {}
    })();

    (function initFirstLaunch() {
      try {
        const launched = localStorage.getItem('hasLaunchedBefore_v3');
        if (!launched) {
          localStorage.setItem('hasLaunchedBefore_v3', 'true');
          state.inputText = ''; /* 清空預設文字 */
        }
      } catch(e) {}
    })();

    window.addEventListener('popstate', () => {
      if (state.isTyping) {
        state._typingHistoryPushed = false;
        exitTyping(true);
      }
    });

    window.addEventListener('resize', () => {
      if (state.isTyping) {
        state.contextWindowSize = 0;
        setTimeout(computeContextWindowSize, 120);
        updateHintKbdCompact();
      }
    }, { passive: true });

    function updateHintKbdCompact(){
      try {
        const viewH = window.innerHeight || 0;
        document.body.classList.toggle('hintkbd-compact', viewH < 650);
      } catch(e) {}
    }

    function applyOverlayClasses(){
      try {
        document.body.classList.toggle('is-typing', !!state.isTyping);
        document.body.classList.toggle('hintkbd-open', !!(state.isTyping && state.hintKbdOn));
        if (state.isTyping && state.hintKbdOn) updateHintKbdCompact();
      } catch(e) {}
    }

    function render() {
      if (state.isTyping) {
        renderTypingMode();
      } else {
        renderMain();
      }
      applyOverlayClasses();
    }

    function ttsSupported() {
      return (typeof window !== 'undefined' && 'speechSynthesis' in window && 'SpeechSynthesisUtterance' in window);
    }
    function normalizeLettersForSpeech(letters) { return letters.join(' '); }
    function extractEnglishLettersFromCharData(charData, method) {
      if (!charData) return [];
      let arr = method === 'quick' ? (charData.q || []) : (charData.cj || []);
      return arr.map(s => String(s).trim()).filter(s => /^[A-Za-z]$/.test(s)).map(s => s.toUpperCase());
    }
    function getVoicesSafe() {
      if (!ttsSupported()) return [];
      try { return window.speechSynthesis.getVoices() || []; } catch(e) { return []; }
    }
    function pickVoice() {
      const voices = getVoicesSafe();
      if (!voices.length) return null;
      if (state.ttsVoiceURI) {
        const v = voices.find(v => v.voiceURI === state.ttsVoiceURI);
        if (v) return v;
      }
      return voices.find(v => /^en(-|_)/i.test(v.lang)) || voices[0];
    }
    function speakLetters(letters) {
      if (!ttsSupported()) { alert('⚠️ 呢部裝置/瀏覽器未支援英文發音'); return; }
      if (!letters || letters.length === 0) return;
      const repeat = Math.max(1, Math.min(2, Number(state.ttsRepeat) || 1));
      const rate = Math.max(0.5, Math.min(1.5, Number(state.ttsRate) || 1.0));
      const voice = pickVoice();
      try { window.speechSynthesis.cancel(); } catch(e) {}
      let i = 0;
      const speakOnce = () => {
        const utter = new SpeechSynthesisUtterance(normalizeLettersForSpeech(letters));
        utter.lang = 'en-US'; utter.rate = rate;
        if (voice) utter.voice = voice;
        utter.onend = () => {
          i++;
          if (i < repeat) setTimeout(speakOnce, 120);
        };
        window.speechSynthesis.speak(utter);
      };
      speakOnce();
    }
    function stopSpeaking() {
      if (!ttsSupported()) return;
      try { window.speechSynthesis.cancel(); } catch(e) {}
    }

    function renderTtsBarHtml(lettersKey) {
      const rateLabel = `x${Number(state.ttsRate).toFixed(1)}`;
      const disabledHint = (!ttsSupported()) ? `<div class="tts-hint">（此瀏覽器未支援發音）</div>` : `<div class="tts-hint">（只限倉頡碼＋字母A-Z）</div>`;
      const repeatVal = Math.max(1, Math.min(2, Number(state.ttsRepeat) || 1));
      return `
        <div class="tts-float-panel ${state.ttsSettingsOpen?'open':''}" data-tts-panel="1" data-letters-key="${escapeHtml(lettersKey)}">
          <div class="tts-settings-head">
            <div class="tts-settings-title">⚙ 發音設定</div>
            <button class="tts-settings-close" id="ttsSettingsClose" title="關閉">✕</button>
          </div>
          <div class="tts-rate">
            <span>語速</span>
            <input id="ttsRate" type="range" min="0.5" max="1.5" step="0.1" value="${escapeHtml(String(state.ttsRate))}">
            <span id="ttsRateLabel">${escapeHtml(rateLabel)}</span>
          </div>
          <div class="tts-rate">
            <span>次數</span>
            <select id="ttsRepeat">
              <option value="1" ${repeatVal===1?'selected':''}>1次</option>
              <option value="2" ${repeatVal===2?'selected':''}>2次</option>
            </select>
          </div>
          <div class="tts-rate">
            <span>人聲</span>
            <select id="ttsVoice"><option value="">（預設）</option></select>
          </div>
          ${disabledHint}
        </div>
      `;
    }

    function bindTtsBarEvents(getLettersFn) {
      const rate = document.getElementById('ttsRate');
      const rateLabel = document.getElementById('ttsRateLabel');
      const repeatSel = document.getElementById('ttsRepeat');
      const voiceSel = document.getElementById('ttsVoice');
      const closeBtn = document.getElementById('ttsSettingsClose');

      const populateVoices = () => {
        if (!voiceSel || !ttsSupported()) return;
        const voices = getVoicesSafe();
        if (!voices.length) return;
        const cur = state.ttsVoiceURI || '';
        const options = [];
        const en = voices.filter(v => /^en(-|_)/i.test(v.lang));
        const other = voices.filter(v => !/^en(-|_)/i.test(v.lang));
        const ordered = [...en, ...other];
        ordered.forEach(v => {
          const label = `${v.name} (${v.lang})`;
          options.push(`<option value="${escapeHtml(v.voiceURI)}" ${v.voiceURI===cur?'selected':''}>${escapeHtml(label)}</option>`);
        });
        voiceSel.innerHTML = `<option value="">（預設）</option>` + options.join('');
      };

      if (rate) {
        rate.addEventListener('input', () => {
          state.ttsRate = Number(rate.value) || 1.0;
          if (rateLabel) rateLabel.textContent = `x${state.ttsRate.toFixed(1)}`;
        });
      }
      if (repeatSel) {
        repeatSel.addEventListener('change', () => { state.ttsRepeat = Number(repeatSel.value) || 1; });
      }
      if (voiceSel) {
        populateVoices();
        try { window.speechSynthesis.onvoiceschanged = populateVoices; } catch(e) {}
        voiceSel.addEventListener('change', () => { state.ttsVoiceURI = String(voiceSel.value || ''); });
      }
      document.addEventListener('click', (e) => {
        const panel = document.querySelector('.tts-float-panel');
        if (!panel || !panel.classList.contains('open')) return;
        const t = e.target;
        if (t && (t.closest('.tts-float-panel') || t.closest('.tts-floatbar'))) return;
        state.ttsSettingsOpen = false;
        render();
      }, { passive: true });
      if (closeBtn) {
        closeBtn.addEventListener('click', (e) => {
          e.preventDefault();
          state.ttsSettingsOpen = false;
          render();
        });
      }
    }

    function renderMain() {

      const text = state.inputText;

      const textArray = text.replace(/\s+/g, '').split('');
      state.textArray = textArray;
      const isReady = (dictStatus === 'ready' || dictStatus === 'embedded');

      let html = `
        <div class="app ${active==='dict'?'mode-dict':''}">

          <div class="tabs">

          <div class="content ${active==='dict'?'content-dict':''}">

      if (active === 'prompter') {
        html += `
          <div class="prompter-area">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">

              <div style="display:flex;gap:8px;">
                <button id="importDictBtn" style="background:rgba(255,255,255,0.08); border:1px solid #334155; color:#cbd5e1; padding:6px 12px; border-radius:12px; font-weight:800; cursor:pointer; font-size:0.9rem;" title="無網絡時可手動匯入字庫檔">📂 匯入</button>
                <button id="fullscreenBtn" style="background:rgba(255,255,255,0.08); border:1px solid #334155; color:#cbd5e1; padding:6px 12px; border-radius:12px; font-weight:800; cursor:pointer; font-size:0.9rem;">🔲 全螢幕</button>
              </div>
              <input type="file" id="dictFileInput" accept=".json" style="display:none;">

            <div style="position:relative;">

        if (drafts.length > 0) {

            <div class="drafts">
              <h3><span>💾 已儲存草稿</span><button id="clearDraftsBtn" class="draft-clear-btn" title="一鍵清曬草稿">🧹 清除</button></h3>

      } else {
        const charData = dictVal ? getCharCodes(dictVal.trim()) : null;
        html += `
          <div class="dict-top">
            <button id="backToPrompter" aria-label="返回">✕</button>
          </div>
          <div class="dict-area">
            <div id="dictInputWrap" class="dict-input-wrap ${dictVal?'has-value':''}">
              <input id="dictInput" class="dict-input" type="text" maxlength="1" placeholder="" value="${escapeHtml(dictVal)}" ${isReady?'':'disabled'}>
              <div class="dict-pen" aria-hidden="true">
                <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                  <path fill="currentColor" d="M16.862 3.487a1.5 1.5 0 0 1 2.121 2.121L8.25 16.341 4 17l.659-4.25L16.862 3.487z"/>
                  <path fill="currentColor" d="M4 20h16v2H4z"/>
                </svg>
              </div>
            </div>
            <div class="toggle-bar" style="max-width:380px;margin:0 auto 10px;">
              <button id="dictBtnQuick" class="${method==='quick'?'active':''}">
                <span class="btn-title">速成</span>
                <span class="btn-status">
                  <span class="status-badge ${(showRad ? 'zh' : 'en')} ${(method==='quick' ? '' : 'inactive')}">${showRad ? '中' : '英'}</span>
                </span>
              </button>
              <button id="dictBtnCangjie" class="${method==='cangjie'?'active':''}">
                <span class="btn-title">倉頡</span>
                <span class="btn-status">
                  <span class="status-badge ${(showRad ? 'zh' : 'en')} ${(method==='cangjie' ? '' : 'inactive')}">${showRad ? '中' : '英'}</span>
                </span>
              </button>
            </div>
            <div class="result-box" id="dictResult">
              ${isReady ? (dictVal ? renderCodeBlocks(charData, dictVal.trim(), method, showRad) : `<div class="result-placeholder">手寫或輸入單字即時解碼</div>`) : `<div style="color:#94a3b8;">⏳ 碼表載入中，請稍後…</div>`}
            </div>
          </div>
        `;
      }
      html += `</div></div>`;
      root.innerHTML = html;

      setTimeout(() => computeContextWindowSize(), 0);
      setTimeout(() => computeContextWindowSize(), 120);

      try {
        if (!state._tctxResizeObserver) {
          const ro = new ResizeObserver(() => {
            clearTimeout(state._tctxResizeDebounce);
            state._tctxResizeDebounce = setTimeout(() => computeContextWindowSize(), 180);
          });
          const box = document.getElementById('typingContext');
          if (box) ro.observe(box);
          state._tctxResizeObserver = ro;
        } else {
          const box = document.getElementById('typingContext');
          if (box) state._tctxResizeObserver.observe(box);
        }
      } catch(e) {}

      if (active === 'dict') {
        const cdNow = (dictVal ? getCharCodes(dictVal.trim()) : null);
        const lettersNow = (!showRad && dictVal && method === 'cangjie') ? extractEnglishLettersFromCharData(cdNow, 'cangjie') : [];
        const sbtn = document.getElementById('ttsSpeakerBtn');
        if (sbtn) {
          sbtn.addEventListener('click', () => {
            state.ttsMuted = !state.ttsMuted;
            try { localStorage.setItem('ttsMuted_v1', state.ttsMuted ? '1' : '0'); } catch(e) {}
            if (state.ttsMuted) stopSpeaking();
            render();
          });
        }
        const gbtn = document.getElementById('ttsGearBtn');
        if (gbtn) {
          gbtn.addEventListener('click', () => {
            state.ttsSettingsOpen = !state.ttsSettingsOpen;
            render();
          });
        }
        if (document.getElementById('ttsRate')) {
          bindTtsBarEvents(() => extractEnglishLettersFromCharData(state.dictInput ? getCharCodes(state.dictInput.trim()) : null, state.inputMethod));
        }
        const key = `dict:${dictVal || ''}:${method}:${lettersNow.join('')}`;
        if (!state.ttsMuted && lettersNow.length > 0 && key !== state.ttsLastSpokenKey) {
          state.ttsLastSpokenKey = key;
          speakLetters(lettersNow);
        }
        if (showRad || method !== 'cangjie' || !dictVal) stopSpeaking();
      }

      document.querySelectorAll('[data-tab]').forEach(btn => {
        btn.addEventListener('click', () => {
          const tab = btn.dataset.tab;
          state.activeTab = tab;
          if (tab === 'dict') { state.inputMethod = 'cangjie'; state.showRadical = true; }
          render();
        });
      });

      const backBtn = document.getElementById('backToPrompter');
      if (backBtn) backBtn.addEventListener('click', () => { state.activeTab = 'prompter'; render(); });
      
      const fsBtn = document.getElementById('fullscreenBtn');
      if (fsBtn) {
        fsBtn.addEventListener('click', () => {
          try {
            if (!document.fullscreenElement && document.documentElement.requestFullscreen) {
              document.documentElement.requestFullscreen();
            } else if (document.exitFullscreen) {
              document.exitFullscreen();
            }
          } catch(e) { alert('此瀏覽器不支援全螢幕 API。建議使用「加入主畫面」功能獲得完美全螢幕體驗。'); }
        });
      }

      /* 綁定手動匯入字庫功能 */
      const importDictBtn = document.getElementById('importDictBtn');
      const dictFileInput = document.getElementById('dictFileInput');
      if (importDictBtn && dictFileInput) {
        importDictBtn.addEventListener('click', () => dictFileInput.click());
        dictFileInput.addEventListener('change', (e) => {
          if (e.target.files.length > 0) {
            loadDictFromFile(e.target.files[0]);
          }
        });
      }

      const textarea = document.getElementById('inputTextArea');
      if (textarea) {
        const updateStartBtnState = () => {
          state.inputText = textarea.value;
          const btn = document.getElementById('startBtn');
          if (btn) {
            const arr = state.inputText.replace(/\s+/g,'').split('');
            btn.disabled = ((dictStatus !== 'ready' && dictStatus !== 'embedded') || arr.length === 0);
          }
          const faux = document.getElementById('fauxPlaceholder');
          if (faux) {
            faux.style.display = state.inputText.length === 0 ? 'flex' : 'none';
          }
        };
        ['input','change','keyup','paste','compositionend'].forEach(evt => {
          textarea.addEventListener(evt, updateStartBtnState);
        });
        updateStartBtnState();
      }

      const startBtn = document.getElementById('startBtn');
      if (startBtn) {
        startBtn.addEventListener('click', async () => {
          if (dictStatus !== 'ready' && dictStatus !== 'embedded') {
            const ok = await ensureDict();
            if (!ok) { alert('碼表尚未準備好，請稍後重試。'); return; }
          }
          const raw = Array.from(state.inputText);
          const arr = [];
          const map = [];
          raw.forEach((ch, i) => {
            if (String(ch).trim() === '') return;
            arr.push(ch); map.push(i);
          });
          if (arr.length === 0) return;
          state.textArray = arr; state.textArrayRaw = raw; state.textIndexMap = map;
          state.currentIndex = 0; 
          state.isTyping = true; 
          state.showSaveDialog = false;
          
          // 強行地一開機就會撐開畫面（強制彈出鍵盤）
          state.hintKbdOn = true; 

          // 自動嘗試進入全螢幕 (防干擾)
          try {
            if (!document.fullscreenElement && document.documentElement.requestFullscreen) {
              document.documentElement.requestFullscreen();
            }
          } catch(e) {}

          try {
            if (!state._typingHistoryPushed) {
              history.pushState({ view: 'typing' }, '', '#typing');
              state._typingHistoryPushed = true;

      document.querySelectorAll('.draft-item').forEach(el => {
        el.addEventListener('click', (e) => {

      document.querySelectorAll('.draft-del-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.preventDefault(); e.stopPropagation();
          const id = Number(btn.dataset.draftDelId);
          if (!id) return;
          state.savedDrafts = state.savedDrafts.filter(d => d.id !== id);
          try { localStorage.setItem('savedDrafts', JSON.stringify(state.savedDrafts)); } catch(err) {}
          render();
        });
      });

      document.getElementById('clearDraftsBtn')?.addEventListener('click', () => {
        state.savedDrafts = [];
        try { localStorage.setItem('savedDrafts', JSON.stringify([])); } catch(e) {}
        render();
      });

      const dictInput = document.getElementById('dictInput');
      if (dictInput) {
        dictInput.addEventListener('input', (e) => {
          let val = e.target.value;
          if (val.length > 1) val = val.slice(0,1);
          state.dictInput = val; render();
        });
        dictInput.addEventListener('focus', (e) => e.target.select());
        dictInput.addEventListener('click', () => {
          if (!state.dictInput) return;
          state.dictInput = ''; render();
          setTimeout(() => {
            const el = document.getElementById('dictInput');

      function toggleDictMethodAndRad(methodKey){
        if (state.inputMethod !== methodKey) {

        if (state.showRadical) stopSpeaking();

      document.getElementById('dictBtnQuick')?.addEventListener('click', () => toggleDictMethodAndRad('quick'));
      document.getElementById('dictBtnCangjie')?.addEventListener('click', () => toggleDictMethodAndRad('cangjie'));
    }

    function getContextWindowSize() {
      const v = Number(state.contextWindowSize || 0);
      if (v && v > 0) return v;
      const box = document.getElementById('typingContext');
      if (box) {
        const fs = parseFloat(getComputedStyle(box).fontSize) || 16;
        const usable = Math.max(0, box.clientWidth - 12);
        const per = fs * 1.20;
        const safety = Math.max(10, per * 0.45);
        let est = Math.floor((usable - safety) / per);
        return Math.max(3, Math.min(24, est || 3));
      }
      return 10;
    }

    function computeContextWindowSize() {
      const box = document.getElementById('typingContext');
      if (!box) return null;
      let m = document.getElementById('tctxMeasure');
      if (!m) {
        m = document.createElement('div');
        m.id = 'tctxMeasure'; m.style.position = 'absolute'; m.style.visibility = 'hidden'; m.style.whiteSpace = 'nowrap'; m.style.left = '-9999px'; m.style.top = '-9999px';
        document.body.appendChild(m);
      }
      const cs = getComputedStyle(box);
      m.style.fontSize = cs.fontSize; m.style.fontFamily = cs.fontFamily; m.style.letterSpacing = cs.letterSpacing; m.style.fontWeight = cs.fontWeight;
      const sampleLen = 12;
      m.innerHTML = Array.from({length: sampleLen}).map(() => `<span class="tctx-ch">日</span>`).join('');
      const sampleW = m.getBoundingClientRect().width || 0;
      if (!sampleW) return null;
      const avg = sampleW / sampleLen;
      const usable = Math.max(0, box.clientWidth - 12);
      const safety = Math.max(10, avg * 0.45);
      let win = Math.max(3, Math.min(24, Math.floor((usable - safety) / avg)));
      const stableWin = (state.contextWindowSize && state.contextWindowSize > 0) ? Math.min(state.contextWindowSize, win) : win;
      if (stableWin !== state.contextWindowSize) {
        state.contextWindowSize = stableWin;
        const ctx = document.getElementById('typingContext');
        if (ctx) ctx.innerHTML = renderTypingContextHtml();
      }
      return stableWin;
    }

    function renderHintKeyboardHtml(letters, isQuick, showRad){
      const rows = ['QWERTYUIOP', 'ASDFGHJKL', 'ZXCVBNM'];
      const normalizedLetters = (letters || []).map(x => String(x || '').toUpperCase().trim()).filter(Boolean);
      const keyColorClasses = {};
      const keyNumbers = {};
      
      normalizedLetters.forEach((L, index) => {
        keyColorClasses[L] ||= [];
        keyNumbers[L] ||= [];
        if (isQuick) {
          const mappedIndex = (index === 0) ? 0 : 4;
          const num = (index === 0) ? 1 : 5;
          keyColorClasses[L].push(`on-${mappedIndex}`);
          keyNumbers[L].push(num);
        } else {
          keyColorClasses[L].push(`on-${index}`);
          keyNumbers[L].push(index + 1);
        }
      });

      const rowHtml = rows.map(r => {
        const keys = r.split('').map(L => {
          const rad = RADICAL_MAP[L] || '';
          const activeClasses = keyColorClasses[L] || [];
          const nums = keyNumbers[L] || [];
          const isOn = activeClasses.length > 0;
          const classesStr = isOn ? `on ${activeClasses.join(' ')}` : '';
          
          let topText = showRad ? (rad || L) : L;
          let bottomText = '';

          if (isOn) {
            bottomText = nums.join(', ');
          } else {
            bottomText = showRad ? L : (rad || '');
          }
          
          return `<div class="hk-key ${classesStr}" data-letter="${L}"><div class="L">${escapeHtml(String(topText))}</div><div class="R">${escapeHtml(String(bottomText))}</div></div>`;
        }).join('');
        return `<div class="hk-row">${keys}</div>`;
      }).join('');
      return `<div id="hintKbd" class="hintkbd" aria-label="倉頡提示鍵盤"><div class="hk-inner">${rowHtml}</div></div>`;
    }

    function renderTypingContextHtml() {
      const arr = state.textArray || [];
      const total = arr.length;
      const idx = state.currentIndex || 0;
      if (!total) return '';
      const win = getContextWindowSize();
      const start = Math.floor(idx / win) * win;
      const end = Math.min(total, start + win);
      const pieces = [];
      for (let i = start; i < end; i++) {
        const ch = arr[i];
        const safe = escapeHtml(ch);
        pieces.push(`<span class="tctx-ch ${i === idx ? 'active' : ''}" data-idx="${i}">${safe}</span>`);
      }
      return pieces.join('');
    }

    function renderTypingMode() {
      const arr = state.textArray;
      const idx = state.currentIndex;
      const char = arr[idx] || '';
      const charData = char ? getCharCodes(char) : null;
      const method = state.inputMethod;
      const showRad = state.showRadical;
      const isQuick = method === 'quick';

      let codeHtml = '';
      if (charData) {
        const codes = isQuick ? charData.q : charData.cj;

        if (isQuick) {
          const blocks = [];
          codes.forEach((letter, i) => {
            if (!letter) return;
            const L = String(letter).toUpperCase();
            const rad = RADICAL_MAP[L] || '';
            const main = showRad ? (rad || L) : L;
            
            // 上方解碼方塊還原：顯示字根副標籤
            const sub = showRad ? L : (rad || '');
            const subHtml = sub ? `<span class="code-sub">${escapeHtml(sub)}</span>` : '';
            
            const colorClass = (i === 0) ? 'cj-0' : 'cj-4';
            blocks.push(`<div class="code-block quick-head ${colorClass} ${showRad?'radical':''} ${sub?'has-sub':''}"><span class="code-main">${escapeHtml(main)}</span>${subHtml}</div>`);
          });
          if (!charData.isPunct) {
            blocks.push(`<div class="code-block arrow"><span class="code-main">➡</span></div><div class="code-block number"><span class="code-main">${escapeHtml(String(charData.qKey||''))}</span></div>`);
          }
          codeHtml = `<div class="code-blocks quick-4col">${blocks.join('')}</div>`;
        } else {
          const cj = charData.cj.filter(Boolean);
          const len = Math.min(5, cj.length);
          const cjBlocks = cj.map((letter, i)=>{
            const L = String(letter).toUpperCase();
            const rad = RADICAL_MAP[L] || '';
            const main = showRad ? (rad || L) : L;
            
            // 上方解碼方塊還原：顯示字根副標籤
            const sub = showRad ? L : (rad || '');
            const subHtml = sub ? `<span class="code-sub">${escapeHtml(sub)}</span>` : '';
            
            const colorClass = `cj-${i}`;
            return `<div class="code-block cj ${colorClass} ${showRad?'radical':''} ${sub?'has-sub':''}"><span class="code-main">${escapeHtml(main)}</span>${subHtml}</div>`;
          }).join('');
          codeHtml = `<div class="code-blocks cj-grid cj-len-${len}">${cjBlocks}</div>`;
        }
      } else {
        codeHtml = `<div class="not-found" style="text-align:center;color:#f87171;width:100%;">
          <div>🔍 字庫未包含此字</div>
          <button onclick="window.open('https://www.chinesecj.com/cjdict/?chsearch=${encodeURIComponent(char)}','_blank','noopener,noreferrer')" style="margin-top:12px;padding:8px 20px;background:#334155;border:1px solid #475569;border-radius:10px;color:white;font-weight:700;cursor:pointer;">🌐 前往線上字典</button>
        </div>`;
      }

      let quickHintHtml = '';
      if (method === 'quick' && charData && !charData.isPunct) {
        quickHintHtml = `<div style="margin-top:10px;color:#94a3b8;font-size:0.9rem;text-align:center;">速成：按 ${charData.qKey}（第 ${charData.qPage} 頁）</div>`;
      }

      const hintLetters = (charData ? (method === 'quick' ? (charData.q || []) : (charData.cj || [])) : []);
      const hintKbdHtml = renderHintKeyboardHtml(hintLetters, method === 'quick', showRad);

      let ttsBarHtml = '';
      if (!showRad && charData && method === 'cangjie') {
        const letters = extractEnglishLettersFromCharData(charData, method);
        if (letters.length > 0) {
          const speakerIcon = state.ttsMuted ? '🔇' : '🔊';
          ttsBarHtml = `
            <div class="tts-floatbar">
              <button id="ttsSpeakerBtn" title="有聲 / 靜音">${speakerIcon}</button>
              <button id="ttsGearBtn" title="設定">⚙</button>
            </div>
            ${renderTtsBarHtml('typing')}
          `;
        }
      }

      let dialogHtml = '';
      if (state.showSaveDialog) {
        dialogHtml = `
          <div class="dialog-overlay">
            <div class="dialog-box">
              <div class="icon">💾</div>
              <h2>讀完啦！</h2>
              <p>想唔想儲存呢段文章落草稿？</p>
              <button id="saveAndClear" class="save-btn">儲存並結束</button>
              <button id="clearOnly" class="clear-btn">唔儲存，直接結束</button>
              <button id="dismissSaveDialog" style="background:transparent;color:#64748b;box-shadow:none;">返去睇多次</button>
            </div>
          </div>
        `;
      }

      // 全新 Flexbox 分割佈局：物理防重疊
      const html = `
        <div class="typing-overlay" id="typingOverlay">
          ${dialogHtml}
          <div class="typing-card">
            <button class="typing-exit" id="exitTyping" title="離開">✕</button>
            <div class="typing-display-area" id="typingDisplayArea">
              <div class="typing-char" id="typingChar">${escapeHtml(char)}</div>
              <div class="typing-context" id="typingContext" aria-label="原文提示">${renderTypingContextHtml()}</div>
            </div>
            <div class="typing-footer">
              <div class="toggle-bar" style="max-width:380px;margin:0 auto 12px;">
                <button id="btnQuick" class="${method==='quick'?'active':''}">
                  <span class="btn-title">速成</span>
                  <span class="btn-status">
                    <span class="status-badge ${(showRad ? 'zh' : 'en')} ${(method==='quick' ? '' : 'inactive')}">${showRad ? '中' : '英'}</span>
                  </span>
                </button>
                <button id="btnCangjie" class="${method==='cangjie'?'active':''}">
                  <span class="btn-title">倉頡</span>
                  <span class="btn-status">
                    <span class="status-badge ${(showRad ? 'zh' : 'en')} ${(method==='cangjie' ? '' : 'inactive')}">${showRad ? '中' : '英'}</span>
                  </span>
                </button>
              </div>
              ${ttsBarHtml}
              ${codeHtml}
              ${quickHintHtml}
            </div>
            <div class="typing-nav-bottom" aria-label="導航與鍵盤開關">
              <button id="prevChar" class="nav-btn" title="上一個">◀</button>
              <button id="hintKbdToggle" class="hintkbd-toggle" title="提示鍵盤（即開即關）">⌨︎</button>
              <button id="nextChar" class="nav-btn" title="下一個">▶</button>
            </div>
          </div>
          <!-- Grid 容器：撐開畫面，不使用絕對定位 -->
          <div class="hintkbd-container">
            ${hintKbdHtml}
          </div>
        </div>
      `;

      root.innerHTML = html;

      const hkBtn = document.getElementById('hintKbdToggle');
      if (hkBtn) {
        hkBtn.addEventListener('click', (e) => {
          e.preventDefault(); e.stopPropagation();
          state.hintKbdOn = !state.hintKbdOn;
          render();
        });
      }

      if (ttsBarHtml) {
        const sbtn = document.getElementById('ttsSpeakerBtn');
        if (sbtn) {
          sbtn.addEventListener('click', () => {
            state.ttsMuted = !state.ttsMuted;
            try { localStorage.setItem('ttsMuted_v1', state.ttsMuted ? '1' : '0'); } catch(e) {}
            if (state.ttsMuted) stopSpeaking();
            render();
          });
        }
        const gbtn = document.getElementById('ttsGearBtn');
        if (gbtn) {
          gbtn.addEventListener('click', () => {
            state.ttsSettingsOpen = !state.ttsSettingsOpen;
            render();
          });
        }
        bindTtsBarEvents(() => extractEnglishLettersFromCharData(getCharCodes(arr[state.currentIndex] || ''), state.inputMethod));

        const lettersNow = extractEnglishLettersFromCharData(charData, method);
        const key = `typing:${idx}:${method}:${lettersNow.join('')}`;
        if (!state.ttsMuted && lettersNow.length > 0 && key !== state.ttsLastSpokenKey) {
          state.ttsLastSpokenKey = key;
          speakLetters(lettersNow);
        }
      }

      function handleTypingOverlayTap(e) {
        if (state.showSaveDialog) return;
        const t = e.target;
        if (t && (t.closest('button') || t.closest('.toggle-group') || t.closest('.toggle-bar') || t.closest('.qchip') || t.closest('.tts-float-panel') || t.tagName === 'INPUT' || t.tagName === 'SELECT')) return;
        const vw = (window.innerWidth || document.documentElement.clientWidth || 0);
        const x = (typeof e.clientX === 'number') ? e.clientX : (vw / 2);
        if (vw && x < vw / 2) goPrev(); else goNext();
      }

      document.getElementById('typingOverlay')?.addEventListener('click', handleTypingOverlayTap);
      document.getElementById('prevChar')?.addEventListener('click', goPrev);
      document.getElementById('nextChar')?.addEventListener('click', goNext);
      document.getElementById('exitTyping')?.addEventListener('click', () => { if (!state.showSaveDialog) exitTyping(); });

      function toggleMethodAndRad(methodKey){
        if (state.inputMethod !== methodKey) { state.inputMethod = methodKey; render(); return; }
        state.showRadical = !state.showRadical;
        if (state.showRadical) stopSpeaking();
        render();
      }

      const btnQuick = document.getElementById('btnQuick');
      const btnCj = document.getElementById('btnCangjie');
      if (btnQuick) {
        btnQuick.classList.toggle('radical-active', (state.inputMethod==='quick' && state.showRadical));
        btnQuick.addEventListener('click', () => toggleMethodAndRad('quick'));
      }
      if (btnCj) {
        btnCj.classList.toggle('radical-active', (state.inputMethod==='cangjie' && state.showRadical));
        btnCj.addEventListener('click', () => toggleMethodAndRad('cangjie'));
      }

      document.getElementById('saveAndClear')?.addEventListener('click', () => {
        if (state.inputText.trim()) {
          const newDraft = { id: Date.now(), text: state.inputText, date: new Date().toLocaleTimeString() };
          state.savedDrafts = [newDraft, ...state.savedDrafts];
          localStorage.setItem('savedDrafts', JSON.stringify(state.savedDrafts));
        }
        closeAndClear();
      });
      document.getElementById('clearOnly')?.addEventListener('click', closeAndClear);
      document.getElementById('dismissSaveDialog')?.addEventListener('click', (e) => {
        e.preventDefault();
        state.showSaveDialog = false; state.currentIndex = 0; render();
      });

      window.typingKeyHandler = function(e) {
        if (state.showSaveDialog) return;
        if (e.code === 'Space' || e.code === 'ArrowRight' || e.code === 'Enter') { e.preventDefault(); goNext(); }
        else if (e.code === 'ArrowLeft' || e.code === 'Backspace') { e.preventDefault(); goPrev(); }
        else if (e.code === 'Escape') { e.preventDefault(); exitTyping(); }
      };
      window.addEventListener('keydown', window.typingKeyHandler);
    }

    function goNext() {
      if (state.currentIndex < state.textArray.length - 1) { 
        state.currentIndex++; 
        state.showSaveDialog = false; 
        render();
      } else { 
        state.hintKbdOn = false;
        state.showSaveDialog = true; 
        render();
      }
    }
    function goPrev() {
      if (state.currentIndex > 0) { state.currentIndex--; state.showSaveDialog = false; render(); }
    }
    function exitTyping(skipHistory=false) {
      if (!skipHistory && state._typingHistoryPushed && location.hash === '#typing') {
        state._typingHistoryPushed = false;
        try { history.back(); } catch(e) {}
        return;
      }
      if (document.exitFullscreen) { try { document.exitFullscreen(); } catch(e){} }
      stopSpeaking();
      state.isTyping = false;
      state.showSaveDialog = false;
      state.currentIndex = 0;
      if (window.typingKeyHandler) {
        window.removeEventListener('keydown', window.typingKeyHandler);
        delete window.typingKeyHandler;
      }
      render();
    }
    function closeAndClear() {
      if (document.exitFullscreen) { try { document.exitFullscreen(); } catch(e){} }
      stopSpeaking();
      state.isTyping = false;
      state.showSaveDialog = false;
      state.currentIndex = 0;
      state.inputText = '';
      if (window.typingKeyHandler) {
        window.removeEventListener('keydown', window.typingKeyHandler);
        delete window.typingKeyHandler;
      }
      render();
    }

    function renderCodeBlocks(charData, charStr, method, showRad) {
      if (!charData) {
        const url = `https://www.chinesecj.com/cjdict/?chsearch=${encodeURIComponent(charStr)}`;
        return `<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;width:100%;"><span style="color:#64748b;font-size:1.8rem;margin-bottom:8px;">📚</span><p style="color:#f87171;font-weight:700;">字庫未包含此字</p><button onclick="window.open('${url}','_blank','noopener,noreferrer')" style="margin-top:12px;padding:8px 20px;background:#334155;border:1px solid #475569;border-radius:10px;color:white;font-weight:700;cursor:pointer;">🌐 前往線上字典</button></div>`;
      }
      let tts = '';
      if (!showRad && method === 'cangjie') {
        const speakerIcon = state.ttsMuted ? '🔇' : '🔊';
        tts = `<div class="tts-floatbar"><button id="ttsSpeakerBtn" title="有聲 / 靜音">${speakerIcon}</button><button id="ttsGearBtn" title="設定">⚙</button></div>${renderTtsBarHtml('dict')}`;
      }
      let blocks = [];
      if (method === 'quick') {
        const q = (charData.isPunct ? charData.cj : charData.q);
        q.forEach((letter, i) => {
          if (!letter) return;
          const L = String(letter).toUpperCase();
          const rad = RADICAL_MAP[L] || '';
          const main = showRad ? (rad || L) : L;
          
          // 上方解碼方塊還原：顯示字根副標籤
          const sub = showRad ? L : (rad || '');
          const subHtml = sub ? `<span class="code-sub">${escapeHtml(sub)}</span>` : '';
          
          const colorClass = (i === 0) ? 'cj-0' : 'cj-4';
          blocks.push(`<div class="code-block quick-head ${colorClass} ${showRad?'radical':''} ${sub?'has-sub':''}"><span class="code-main">${escapeHtml(main)}</span>${subHtml}</div>`);
        });
        if (!charData.isPunct) {
          blocks.push(`<div class="code-block arrow"><span class="code-main">➡</span></div><div class="code-block number"><span class="code-main">${escapeHtml(String(charData.qKey||''))}</span></div>`);
        }
      } else {
        const cj = charData.cj.filter(Boolean);
        const len = Math.min(5, cj.length);
        const cjBlocks = cj.map((letter, i)=>{
          const L = String(letter).toUpperCase();
          const rad = RADICAL_MAP[L] || '';
          const main = showRad ? (rad || L) : L;
          
          // 上方解碼方塊還原：顯示字根副標籤
          const sub = showRad ? L : (rad || '');
          const subHtml = sub ? `<span class="code-sub">${escapeHtml(sub)}</span>` : '';
          
          const colorClass = `cj-${i}`;
          return `<div class="code-block cj ${colorClass} ${showRad?'radical':''} ${sub?'has-sub':''}"><span class="code-main">${escapeHtml(main)}</span>${subHtml}</div>`;
        }).join('');
        return `${tts}<div class="code-blocks cj-grid cj-len-${len}">${cjBlocks}</div>`;
      }
      return `${tts}<div class="code-blocks quick-4col">${blocks.join('')}</div>`;
    }

    function selfTestCjLayout() {
      try{
        const host = document.createElement('div');
        host.style.position='fixed'; host.style.left='-9999px'; host.style.opacity='0'; host.style.pointerEvents='none';
        host.innerHTML = `<div class="code-blocks cj-grid cj-len-5" id="_cj5test"><div class="code-block cj">A</div><div class="code-block cj">B</div><div class="code-block cj">C</div><div class="code-block cj">D</div><div class="code-block cj">E</div></div>`;
        document.body.appendChild(host);
        host.remove();
      } catch(e) {}
    }

    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // ---------- 啟動 ----------
    loadDictFromCache();

    if (!cjDict) {
      const embedded = getEmbeddedDictUpper();
      cjDict = embedded;
      dictStatus = 'embedded';
      try { localStorage.setItem(CJ_CACHE_KEY, JSON.stringify(embedded)); } catch(e) {}
    }

    render();

    if (dictStatus !== 'ready' && dictStatus !== 'embedded') {
      fetchDictWithRetry();
    }
  })();
</script>
</body>
</html>
